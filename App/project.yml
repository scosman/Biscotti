name: Biscotti
options:
  bundleIdPrefix: net.scosman
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    OTHER_SWIFT_FLAGS: "$(inherited) -warnings-as-errors"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"   # Developer ID for distribution; make build-app overrides to ad-hoc
    DEVELOPMENT_TEAM: B5L5M4B62J                      # Stephen Cosman (Developer ID Application)
    INFOPLIST_KEY_CFBundleDisplayName: "Biscotti"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  BiscottiKit:
    path: ../Packages/BiscottiKit
  Transcription:
    path: ../Packages/Transcription
  AudioCapture:
    path: ../Packages/AudioCapture
  LocalLLM:
    path: ../Packages/LocalLLM

targets:
  Biscotti:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.scosman.biscotti
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Biscotti.entitlements
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: BiscottiKit
        product: AppShellUI
      - package: BiscottiKit
        product: AppCore
      - package: BiscottiKit
        product: DataStore
      - package: BiscottiKit
        product: Intelligence
      - package: BiscottiKit
        product: MenuBarUI
      - package: BiscottiKit
        product: Notifications
      - package: Transcription
        product: Transcription
      - package: AudioCapture
        product: AudioCapture
      - package: LocalLLM
        product: LocalLLM
      - target: BiscottiTranscriber
        embed: true
      - target: BiscottiLLM
        embed: true

  BiscottiTranscriber:
    type: xpc-service
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ../XPCServices/BiscottiTranscriber
        excludes:
          - "*.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.scosman.biscotti.BiscottiTranscriber
        INFOPLIST_FILE: ../XPCServices/BiscottiTranscriber/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../XPCServices/BiscottiTranscriber/BiscottiTranscriber.entitlements
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Transcription
        product: Transcription

  BiscottiLLM:
    type: xpc-service
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ../XPCServices/BiscottiLLM
        excludes:
          - "*.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.scosman.biscotti.BiscottiLLM
        INFOPLIST_FILE: ../XPCServices/BiscottiLLM/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../XPCServices/BiscottiLLM/BiscottiLLM.entitlements
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: LocalLLM
        product: LocalLLM

schemes:
  Biscotti:
    build:
      targets:
        Biscotti: all
    run:
      config: Debug
    test:
      config: Debug
