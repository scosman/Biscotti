name: EventKitLab
options:
  bundleIdPrefix: com.biscotti.experiments
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.34.0"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: arm64
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    SWIFT_VERSION: "6.2"
    ENABLE_APP_SANDBOX: "NO"

targets:
  EventKitLab:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.biscotti.experiments.eventkitlab
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
    scheme:
      testTargets:
        - EventKitLabTests

  EventKitLabTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: EventKitLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.biscotti.experiments.eventkitlab.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EventKitLab.app/Contents/MacOS/EventKitLab"
        BUNDLE_LOADER: "$(TEST_HOST)"
