server_name: "Biscotti"
server_description: "Biscotti dev commands — thin wrappers over the Makefile."

actions:
  - name: "bootstrap"
    description: "Install dev tools via Homebrew (brew bundle)"
    command: "make bootstrap"

  - name: "generate"
    description: "Generate the Xcode project from project.yml"
    command: "make generate"

  # build/test/precommit_checks compile against the argmax-oss-swift dependency
  # (WhisperKit/SpeakerKit), whose build/error output is extremely verbose — an
  # unbounded MCP response can overflow an agent's context window. Bound the
  # response with `tail` (generous, to preserve trailing error detail) while
  # `set -o pipefail` keeps make's exit code so failures still surface as errors.
  # Humans and CI invoke `make` directly and are unaffected.
  - name: "build"
    description: "Build all SPM packages"
    command: "bash -c 'set -o pipefail; make build 2>&1 | tail -n 400'"

  - name: "test"
    description: "Gating: run the package test suite (swift test)"
    command: "bash -c 'set -o pipefail; make test 2>&1 | tail -n 400'"

  - name: "lint"
    description: "Check formatting + lint (non-mutating)"
    command: "make lint"

  - name: "format"
    description: "Auto-format and autofix lint"
    command: "make format"

  - name: "precommit_checks"
    description: "Run the pre-commit checks (format + lint + test). Required before a --no-verify commit from inside the Claude Code agent; see CLAUDE.md."
    command: "bash -c 'set -o pipefail; make precommit-checks 2>&1 | tail -n 400'"

  # build_app/test_app wrap xcodebuild, which is very verbose. The Makefile uses
  # `xcodebuild -quiet` (warnings/errors + final status only); here we additionally
  # tail the result so an MCP tool response stays bounded. `pipefail` keeps make's
  # exit code so failures still surface as errors.
  - name: "build_app"
    description: "Non-gating: generate project + build the app (xcodebuild)"
    command: "bash -c 'set -o pipefail; make build-app 2>&1 | tail -n 30'"

  - name: "test_app"
    description: "Non-gating: run the app test scheme"
    command: "bash -c 'set -o pipefail; make test-app 2>&1 | tail -n 30'"

  - name: "manual_tests_check"
    description: "Check that all manual test step IDs have been run (expected RED until Phase 4.5)"
    command: "bash -c 'set -o pipefail; make manual-tests-check 2>&1 | tail -n 50'"

  # The local_llm experiment (experiments/llm) is a standalone SPM package,
  # intentionally NOT in PACKAGES / `make build` / CI (matches ArgMaxKit), so it
  # has no make target. These actions give the agent an out-of-sandbox build/test
  # path for it: `swift build`/`swift test` under the agent Bash sandbox hit an
  # llbuild `sandbox-exec` denial, but the MCP server runs outside that sandbox.
  # Output is tailed to stay within the agent context window (the first build
  # downloads the verbose LlamaSwift XCFramework); `pipefail` preserves the exit
  # code so failures still surface as errors.
  - name: "build_llm"
    description: "Build the local_llm experiment SPM package (experiments/llm)"
    command: "bash -c 'set -o pipefail; swift build --package-path experiments/llm 2>&1 | tail -n 400'"
    timeout: 300

  - name: "test_llm"
    description: "Run the local_llm experiment unit tests (experiments/llm). Always-on tests only; the env-gated AI/integration test (LLM_RUN_AI=1) needs the model and is human/Phase-4 run."
    command: "bash -c 'set -o pipefail; swift test --package-path experiments/llm 2>&1 | tail -n 400'"
    timeout: 300
